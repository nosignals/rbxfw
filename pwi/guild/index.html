<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Post Form Generator</title>

    <!-- Custom CSS untuk Tema Gelap Discord -->
    <style>
        body {
            background-color: #202225 !important;
            color: #ffffff !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            background-color: #36393f !important;
            border: 1px solid #202225 !important;
            border-radius: 12px;
        }
        .form-label {
            color: #b9bbbe !important;
        }
        .form-control, .form-select {
            background-color: #40444b !important;
            border: 1px solid #202225 !important;
            color: #ffffff !important;
        }
        .form-control:focus, .form-select:focus {
            background-color: #454950 !important;
            border-color: #5865F2 !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 0.25rem rgba(88, 101, 242, 0.25) !important;
        }
        .form-control::placeholder {
            color: #72767d !important;
        }
        .btn-discord {
            background-color: #5865F2 !important;
            color: #ffffff !important;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-discord:hover {
            background-color: #4752C4 !important;
            color: #ffffff !important;
        }
        .text-muted-discord {
            color: #a3a6aa !important;
        }
    </style>
  </head>
  <body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <div class="card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold" style="color: #5865F2;">Generate Post</h3>
                    </div>

                    <form id="forumForm">
                        <!-- Input Webhook -->
                        <div class="mb-3">
                            <label for="webhookInput" class="form-label fw-semibold mb-2">URL Webhook</label>
                            <input type="text" class="form-control form-control-lg" id="webhookInput" placeholder="https://discord.com..." required>
                        </div>

                        <!-- Dropdown Kegiatan -->
                        <div class="mb-3">
                            <label for="kegiatanInput" class="form-label fw-semibold mb-2">Activity</label>
                            <select class="form-select form-control-lg w-100" id="kegiatanInput" style="padding: .5rem 1rem;">
                                <option value="Kontes">Kontes</option>
                                <option value="WB">WB</option>
                                <option value="Trial Guild">Trial</option>
                            </select>
                        </div>

                        <!-- Date Picker -->
                        <div class="mb-4">
                            <label for="dateInput" class="form-label fw-semibold mb-2">Date</label>
                            <input type="date" class="form-control form-control-lg" id="dateInput" required>
                        </div>

                        <!-- Tombol Kirim -->
                        <button type="submit" class="btn btn-discord btn-lg w-100 py-3 shadow-sm">
                            Create Post
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->
    <!--
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->

    <!-- Logic Script untuk Aplikasi -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Set default tanggal hari ini
        const dateInput = document.getElementById('dateInput');
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        dateInput.value = `${year}-${month}-${day}`;

        // Load URL Webhook dari LocalStorage
        const savedWebhook = localStorage.getItem('discord_webhook_url');
        if (savedWebhook) {
            document.getElementById('webhookInput').value = savedWebhook;
        }
    });

    function formatTanggalIndo(dateString) {
        const bulanIndo = [
            "Januari", "Februari", "Maret", "April", "Mei", "Juni",
            "Juli", "Agustus", "September", "Oktober", "November", "Desember"
        ];

        const date = new Date(dateString);
        const hari = date.getDate();
        const bulan = bulanIndo[date.getMonth()];
        const tahun = date.getFullYear();

        return `${hari} ${bulan} ${tahun}`;
    }

    document.getElementById('forumForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const webhookUrl = document.getElementById('webhookInput').value.trim();
        const namaKegiatan = document.getElementById('kegiatanInput').value;
        const tanggalMentah = document.getElementById('dateInput').value;

        localStorage.setItem('discord_webhook_url', webhookUrl);

        const tanggalDiformat = formatTanggalIndo(tanggalMentah);

        const payload = {
            "thread_name": `Absen ${namaKegiatan} ${tanggalDiformat}`,
            "content": `Format Absensi : **[Nama]_[Nickname]** dan **Screenshoot** Saat ${namaKegiatan}\n ||@everyone||`
        };

        fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                alert(`Sukses! Post template untuk ${namaKegiatan} (${tanggalDiformat}) berhasil dibuat.`);
            } else {
                alert('Gagal mengirim. Mohon periksa kembali apakah URL Webhook sudah benar.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Terjadi kesalahan jaringan.');
        });
    });
    </script>
  </body>
</html>
